<div role="status" class="max-w-md p-2 rounded-2xl animate-pulse mb-4">
  <div class="flex flex-col justify-center items-center mb-4">
    <lucide-angular
      class="md-on-surface"
      [img]="userIcon"
      size="80"
    ></lucide-angular>
    <div class="h-4 md-secondary-container rounded-full w-34 mb-2.5"></div>
  </div>
  <div class="grid grid-cols-3 gap-4">
    <div>
      <div class="h-22.5 md-secondary-container rounded-2xl w-full"></div>
    </div>
    <div>
      <div class="h-22.5 md-secondary-container rounded-2xl w-full"></div>
    </div>
    <div>
      <div class="h-22.5 md-secondary-container rounded-2xl w-full"></div>
    </div>
  </div>
  <span class="sr-only">Loading...</span>
</div>
