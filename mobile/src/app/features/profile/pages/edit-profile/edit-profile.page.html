<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title class="font-semibold">Editar perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="flex items-center justify-center">
    <div class="rounded-2xl md-surface-container p-8 w-full ion-margin">
      <form class="max-w-sm mx-auto my-5" [formGroup]="userForm">
        <div class="mb-5">
          <ion-input
            label="Nombre"
            label-placement="floating"
            fill="outline"
            placeholder="Ingresa tu nombre"
            type="text"
            formControlName="name"
          ></ion-input>
        </div>
        <div>
          <ion-input
            label="Apellido"
            label-placement="floating"
            fill="outline"
            placeholder="Ingresa tu apellido"
            type="text"
            formControlName="last"
          ></ion-input>
        </div>
      </form>
    </div>
  </div>
</ion-content>
<ion-footer class="ion-no-border">
  <ion-toolbar>
    <div class="ion-padding">
      <button
        type="submit"
        class="focus:outline-none font-medium rounded-3xl text-base px-6 py-3.5 text-center inline-flex items-center justify-center w-full ion-activatable relative overflow-hidden"
        [ngClass]="{
              'md-primary md-on-primary': userForm.valid,
              'md-tertiary md-on-tertiary': !userForm.valid
            }"
        [disabled]="!userForm.valid"
        (click)="updateUser()"
      >
        @if (userForm.valid) {
        <ion-ripple-effect></ion-ripple-effect>
        }
        <lucide-angular
          class="me-1"
          [img]="completeEditProfileIcon"
          size="18"
        ></lucide-angular>
        Actualizar datos
      </button>
    </div>
  </ion-toolbar>
</ion-footer>
