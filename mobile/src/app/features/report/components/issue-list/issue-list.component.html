@if (userService.isLoading() || issueService.isLoading()) {
<div class="flex flex-col space-y-4">
  <app-issue-detail-loading class="mb-4"></app-issue-detail-loading>
  <app-issue-detail-loading class="mb-4"></app-issue-detail-loading>
  <app-issue-detail-loading class="mb-4"></app-issue-detail-loading>
</div>
} @else if (!uiService.hasConnection() && !issueList()?.data?.length) {
<app-alert
  [icon]="noConnectionIcon"
  [title]="'Sin conexión'"
  [content]="'Conéctate a internet para cargar los reportes.'"
></app-alert>
} @else if (!issueList()?.data?.length) {
<app-alert
  [icon]="emptyIcon"
  [title]="'Sin reportes'"
  [content]="'Todavía no hay reportes para mostrar.'"
></app-alert>
} @else { @for (issue of issueList()?.data; track issue.id) {
<app-issue-detail [issue]="issue"></app-issue-detail>
} }
