@if (!categoryService.categories().length) {
<app-alert
  [icon]="emptyIcon"
  [title]="'Sin categorias'"
  [content]="
    'Conéctate a internet para descargar las categorías por primera vez.'
  "
></app-alert>
} @if (categoryService.categories().length) {
<div class="grid grid-cols-2 gap-1 ion-margin-vertical">
  @for (category of categoryService.categories(); track $index) {
  <button
    type="button"
    class="flex justify-start items-center px-3 py-4 rounded-2xl font-medium border category-item ion-activatable relative overflow-hidden"
    [class.selected]="selectedCategoryId === category.id"
    (click)="selectCategory(category.id)"
  >
    <ion-ripple-effect></ion-ripple-effect>
    <div class="me-2">
      <div
        class="category-icon"
        [innerHTML]="sanitizer.bypassSecurityTrustHtml(category.icon)"
      ></div>
    </div>
    <span class="text-sm">{{ category.name }}</span>
  </button>
  }
</div>
}
