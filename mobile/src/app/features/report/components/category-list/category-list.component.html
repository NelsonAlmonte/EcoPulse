@if (!categoryService.categories()) {
  <p>Cargando...</p>
}
@if (categoryService.categories()) {
  <div class="grid grid-cols-2 gap-2 ion-margin-bottom ion-margin-top">
    @for (category of categoryService.categories(); track $index) {
      <button
        type="button"
        class="flex justify-start items-center px-3 py-4 rounded-full font-medium category-item ion-activatable relative overflow-hidden"
        [class.selected]="selectedCategoryId === category.id"
        (click)="selectCategory(category.id)"
      >
        <ion-ripple-effect></ion-ripple-effect>
        <div class="me-2">
          <div
            class="category-icon"
            [innerHTML]="sanitizer.bypassSecurityTrustHtml(category.icon)"
          ></div>
        </div>
        <span class="text-sm">{{ category.name }}</span>
      </button>
    }
  </div>
}
