<div class="flex flex-col items-center justify-center h-full">
  <div class="absolute inset-0 flex items-start justify-end p-4">
    <div
      class="rounded-full md-secondary-container md-on-secondary-container p-2 z-50 ion-activatable relative overflow-hidden"
      (click)="close()"
    >
      <ion-ripple-effect></ion-ripple-effect>
      <lucide-angular [img]="closeIcon" size="22"></lucide-angular>
    </div>
  </div>
  <img
    class="rounded-2xl w-full object-cover"
    src="{{ photo() }}"
    alt="Reporte"
  />
</div>
