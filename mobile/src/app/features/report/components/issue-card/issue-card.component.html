<div class="md-surface-container-high rounded-2xl mb-4 issue-detail-card">
  <div class="relative w-full h-50 photo-container">
    <img
      class="rounded-2xl w-full h-full object-cover"
      src="{{ issue().photo }}"
      alt="{{ issue().category.name }}"
    />
    <div class="absolute inset-0 bg-black/40 rounded-2xl"></div>
    <div class="absolute inset-0 flex items-start justify-end p-4">
      <ng-content></ng-content>
    </div>
    <div class="absolute inset-0 flex items-end justify-start p-4">
      <div class="flex items-center justify-start md-on-primary">
        <div
          class="me-2 p-2 rounded-full md-secondary-container md-on-secondary-container"
        >
          <div
            class="h-6 w-6"
            [innerHTML]="
              sanitizer.bypassSecurityTrustHtml(issue().category.icon)
            "
          ></div>
        </div>
        <div>
          <h2 class="text-xl font-bold my-0!">
            {{ issue().category.name }}
          </h2>
          <span class="opacity-75 font-medium"
            >Reporte {{ issue().status.toLocaleLowerCase() }}</span
          >
        </div>
      </div>
    </div>
  </div>
  <div class="px-4 py-6">
    <div class="flex items-center justify-between">
      <div class="flex items-center justify-start">
        <lucide-angular
          class="me-1 md-on-surface-variant"
          [img]="userIcon"
          size="36"
        ></lucide-angular>
        <div class="flex flex-col">
          <span class="md-on-surface font-semibold">
            {{ issue().user.name + " " + issue().user.last }}
          </span>
          <span class="md-on-surface-variant text-sm font-medium">
            {{ issue().createdAt | relativeTime : "es-ES" }}
          </span>
        </div>
      </div>
      <ng-content select="app-highlight-button"></ng-content>
    </div>
    @if (issue().comment) {
    <div class="mt-6">
      <p class="font-medium md-on-surface-variant">
        {{ issue().comment }}
      </p>
    </div>
    }
  </div>
</div>
