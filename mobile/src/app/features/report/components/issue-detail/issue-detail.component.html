@if (!issueData) {
<app-issue-detail-loading></app-issue-detail-loading>
} @if (issueData) {
<app-issue-card [issue]="issueData">
  <button
    id="open-options-{{ issueData.id }}"
    class="rounded-full md-secondary-container md-on-secondary-container p-2 z-50 ion-activatable relative overflow-hidden"
    (click)="openOptions()"
  >
    <ion-ripple-effect class="md-on-secondary-container"></ion-ripple-effect>
    <lucide-angular [img]="optionsIcon" size="22"></lucide-angular>
  </button>
  <app-highlight-button [issue]="issueData"></app-highlight-button>
</app-issue-card>
}
