<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar>
    <ion-title class="font-semibold ion-margin-start">Reportes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="md-surface md-on-surface">
  <ion-refresher slot="fixed" (ionRefresh)="refreshLatestIssues($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <p class="text-lg font-semibold ion-padding">Ubicación actual</p>
  <app-location-preview></app-location-preview>

  <div
    class="flex justify-between items-center py-2 my-2 ion-activatable relative overflow-hidden ion-padding-horizontal"
    (click)="navigate('/user-issues')"
  >
    <span class="text-lg font-semibold">Tus últimos reportes</span>
    <ion-ripple-effect></ion-ripple-effect>
    <button
      type="button"
      class="md-surface-container md-on-surface focus:outline-none rounded-2xl p-2 ion-activatable relative overflow-hidden"
      (click)="navigate('/user-issues')"
    >
      <ion-ripple-effect></ion-ripple-effect>
      <lucide-angular [img]="arrowRight" size="18"></lucide-angular>
    </button>
  </div>

  <div class="mb-40 ion-padding-horizontal">
    <app-issue-list [issueList]="userService.issueList()"></app-issue-list>
  </div>

  <div class="fixed bottom-22 right-0 z-50 ion-padding-end">
    <button
      type="button"
      class="md-primary md-on-primary focus:outline-none font-bold rounded-2xl text-sm p-4 text-center inline-flex items-center shadow-xl ion-activatable relative overflow-hidden"
      (click)="takePicture()"
    >
      <ion-ripple-effect></ion-ripple-effect>
      <lucide-angular
        class="me-1"
        [img]="cameraIcon"
        size="24"
      ></lucide-angular>
      <span>Reportar</span>
    </button>
  </div>
</ion-content>
